[build]
  command = "npm run prebuild && npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "8"
  CI = "false"

[[redirects]]
  from = "/api/*"
  to = "https://your-backend-domain.com/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "npm run prebuild && npm run build"

[context.deploy-preview]
  command = "npm run prebuild && npm run build"
